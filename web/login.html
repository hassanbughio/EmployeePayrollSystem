<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Payroll System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .login-title {
            color: #0f3460;
            font-weight: 700;
            font-size: 28px;
        }
        .btn-login {
            background: linear-gradient(135deg, #0f3460, #e94560);
            border: none;
            border-radius: 10px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
        }
        .btn-login:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        .form-control {
            border-radius: 10px;
            padding: 12px;
            border: 2px solid #e0e0e0;
        }
        .form-control:focus {
            border-color: #0f3460;
            box-shadow: none;
        }
        .logo-icon {
            font-size: 50px;
            text-align: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="login-card">
    <div class="logo-icon">💼</div>
    <h2 class="login-title text-center mb-1">Payroll System</h2>
    <p class="text-center text-muted mb-4">Employee Management Portal</p>

    <div id="errorMsg" class="alert alert-danger d-none"></div>

    <div class="mb-3">
        <label class="form-label fw-bold">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter username">
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password">
    </div>
    <div class="mb-3">
        <label class="form-label fw-bold">Role</label>
        <select id="role" class="form-control">
            <option value="ADMIN">Admin</option>
            <option value="USER">User</option>
        </select>
    </div>

    <button class="btn btn-login text-white w-100 mt-2" onclick="doLogin()">
        🔐 Login
    </button>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
<script>
    function doLogin() {
        const username = $('#username').val();
        const password = $('#password').val();
        const role = $('#role').val();

        if (!username || !password) {
            $('#errorMsg').removeClass('d-none').text('Please enter username and password!');
            return;
        }

        $.ajax({
            url: 'login',
            type: 'POST',
            data: { username, password, role },
            success: function(response) {
                if (response === 'success') {
                    window.location.href = 'dashboard.html';
                } else {
                    $('#errorMsg').removeClass('d-none').text('Invalid username or password!');
                }
            },
            error: function() {
                $('#errorMsg').removeClass('d-none').text('Server error! Please try again.');
            }
        });
    }

    // Enter key press
    $(document).keypress(function(e) {
        if (e.which === 13) doLogin();
    });
</script>
</body>
</html>
