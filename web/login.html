<!DOCTYPE html>
<html>
<head>
    <title>Payroll System</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 50px; }
        .form { max-width: 400px; margin: auto; }
        input { width: 100%; padding: 10px; margin: 10px 0; }
        button { width: 100%; padding: 10px; background: #c41e3a; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Payroll System</h1>
    <div class="form">
        <input type="text" id="username" placeholder="Username" value="admin">
        <input type="password" id="password" placeholder="Password" value="admin123">
        <input type="text" id="role" placeholder="Role" value="Admin" readonly>
        <button onclick="login()">Login</button>
        <div id="result"></div>
    </div>
    
    <script>
        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const result = document.getElementById('result');
            
            if (username === 'admin' && password === 'admin123') {
                result.innerHTML = '<h2 style="color: green;">✅ Login Successful! Role: ADMIN</h2>';
                document.getElementById('role').value = 'Admin';
            } else if (username === 'hassan' && password === 'user123') {
                result.innerHTML = '<h2 style="color: green;">✅ Login Successful! Role: USER</h2>';
                document.getElementById('role').value = 'User';
            } else {
                result.innerHTML = '<h2 style="color: red;">❌ Invalid Credentials</h2>';
            }
        }
    </script>
</body>
</html>
